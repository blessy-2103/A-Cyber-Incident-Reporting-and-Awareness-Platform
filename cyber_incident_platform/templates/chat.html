<!DOCTYPE html>
<html>
<head>
    <title>Cyber Security Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background:#f4f6fb; padding:40px; }
        h2 { color:#6a11cb; }
        input { padding:10px; width:70%; border-radius:5px; border:1px solid #ccc; }
        button { padding:10px 20px; border:none; border-radius:5px; background:#6a11cb; color:white; cursor:pointer; }
        .response { margin-top:20px; background:white; padding:15px; border-radius:8px; box-shadow:0 5px 15px rgba(0,0,0,0.1);}
    </style>
</head>
<body>
<h2>CYBER BOT</h2>

<form method="POST">
    <input type="text" name="message" placeholder="Ask a question..." required>
    <button type="submit">Send</button>
</form>

{% if response %}
    <div class="response">
        <strong>AI Response:</strong>
        <p>{{ response }}</p>
    </div>
{% endif %}
</body>
</html>
