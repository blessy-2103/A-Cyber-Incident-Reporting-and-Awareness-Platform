<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Incident Monitor - Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Pure Purple Palette */
            --deep-purple: #2e1065;   /* Very dark purple base */
            --mid-purple: #6b21a8;    /* Action purple */
            --bright-purple: #a855f7; /* Highlight purple */
            --glass-purple: rgba(255, 255, 255, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Solid Deep Purple Base */
            background-color: var(--deep-purple); 
            overflow: hidden;
            position: relative;
        }

        /* --- ANIMATED PURPLE BACKGROUND --- */
        .bg-canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            /* Gradient that feels like "Liquid Purple" */
            background: linear-gradient(135deg, #2e1065 0%, #4c1d95 50%, #6b21a8 100%);
            z-index: -2;
        }

        /* Moving Neon Purple Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.6;
            animation: drift 12s infinite alternate ease-in-out;
        }
        .orb-1 { width: 500px; height: 500px; background: #9333ea; top: -10%; left: -5%; }
        .orb-2 { width: 400px; height: 400px; background: #c084fc; bottom: -10%; right: -5%; animation-delay: -4s; }
        .orb-3 { width: 300px; height: 300px; background: #581c87; top: 40%; left: 30%; animation-duration: 15s; }

        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(60px, 40px) scale(1.1); }
        }

        /* --- LOGIN CARD --- */
        .login-box {
            background: var(--glass-purple);
            padding: 50px 40px;
            border-radius: 28px;
            width: 400px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.4);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: popIn 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        .icon-header {
            font-size: 55px;
            background: linear-gradient(135deg, var(--mid-purple), var(--bright-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            display: inline-block;
            animation: float-icon 3s ease-in-out infinite;
        }

        @keyframes float-icon {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        h2 { font-weight: 800; color: #1e1b4b; margin-bottom: 10px; font-size: 26px; }
        .note { font-size: 14px; color: #6b7280; margin-bottom: 35px; }

        /* --- INPUTS --- */
        .input-wrap { position: relative; margin-bottom: 20px; }
        .input-wrap i {
            position: absolute; left: 16px; top: 50%;
            transform: translateY(-50%); color: #9ca3af; transition: 0.3s;
        }

        input {
            width: 100%;
            padding: 16px 15px 16px 48px;
            border-radius: 14px;
            border: 2px solid #f3f4f6;
            outline: none;
            font-size: 15px;
            background: #f9fafb;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--mid-purple);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(107, 33, 168, 0.1);
        }

        input:focus + i { color: var(--mid-purple); }

        /* --- BUTTON --- */
        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--mid-purple), var(--bright-purple));
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(107, 33, 168, 0.3);
            margin-top: 10px;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 35px rgba(107, 33, 168, 0.4);
        }

        .error-alert {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 25px;
            border: 1px solid #fee2e2;
        }

        .signup-text { margin-top: 30px; font-size: 14px; color: #4b5563; }
        .signup-text a { color: var(--mid-purple); text-decoration: none; font-weight: 800; }
        .signup-text a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="bg-canvas"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="login-box">
        <div class="icon-header">
            <i class="fas fa-shield-halved"></i>
        </div>
        
        <h2>Cyber Guard</h2>
        <div class="note">Security begins with a single login</div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="error-alert">
                <i class="fas fa-triangle-exclamation"></i> {{ messages[0] }}
            </div>
        {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="input-wrap">
                <input type="email" name="email" placeholder="Email Address" required>
                <i class="fas fa-at"></i>
            </div>
            
            <div class="input-wrap">
                <input type="password" name="password" placeholder="Password" required>
                <i class="fas fa-key"></i>
            </div>

            <button type="submit">login</button>
        </form>

        <p class="signup-text">New user? <a href="/register">Register</a></p>
    </div>

</body>
</html>
