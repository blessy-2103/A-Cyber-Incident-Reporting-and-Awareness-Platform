<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Incident Monitor - Register Analyst</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --deep-purple: #2e1065;
            --mid-purple: #6b21a8;
            --bright-purple: #a855f7;
            --glass-white: rgba(255, 255, 255, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--deep-purple); 
            overflow: hidden;
            position: relative;
        }

        /* --- ANIMATED PURPLE BACKGROUND --- */
        .bg-canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #2e1065 0%, #4c1d95 50%, #6b21a8 100%);
            z-index: -2;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.5;
            animation: drift 15s infinite alternate ease-in-out;
        }
        .orb-1 { width: 450px; height: 450px; background: #9333ea; top: -10%; right: -5%; }
        .orb-2 { width: 350px; height: 350px; background: #c084fc; bottom: -5%; left: -5%; animation-delay: -3s; }

        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(-50px, 30px) scale(1.05); }
        }

        /* --- REGISTER CARD --- */
        .register-box {
            background: var(--glass-white);
            padding: 45px 35px;
            border-radius: 28px;
            width: 420px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.4);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .icon-header {
            font-size: 50px;
            background: linear-gradient(135deg, var(--mid-purple), var(--bright-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            animation: float-icon 3s ease-in-out infinite;
        }

        @keyframes float-icon {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        h2 { font-weight: 800; color: #1e1b4b; margin-bottom: 8px; font-size: 26px; letter-spacing: -0.5px; }
        .note { font-size: 14px; color: #6b7280; margin-bottom: 30px; font-weight: 500; }

        /* --- INPUT GROUPS --- */
        .input-group {
            position: relative;
            margin-bottom: 18px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #4b5563;
            margin-bottom: 6px;
            margin-left: 4px;
        }

        .input-wrapper { position: relative; }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            transition: 0.3s;
        }

        input {
            width: 100%;
            padding: 14px 15px 14px 48px;
            border-radius: 14px;
            border: 2px solid #f3f4f6;
            outline: none;
            font-size: 14px;
            font-weight: 500;
            background: #f9fafb;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--mid-purple);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(107, 33, 168, 0.1);
        }

        input:focus + i { color: var(--mid-purple); }

        /* --- BUTTON --- */
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--mid-purple), var(--bright-purple));
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(107, 33, 168, 0.3);
            margin-top: 15px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(107, 33, 168, 0.4);
            filter: brightness(1.05);
        }

        .error-alert {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
            border: 1px solid #fee2e2;
        }

        .login-link { margin-top: 25px; font-size: 14px; color: #4b5563; font-weight: 500; }
        .login-link a { color: var(--mid-purple); text-decoration: none; font-weight: 800; }
        .login-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="bg-canvas"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="register-box">
        <div class="icon-header">
            <i class="fas fa-user-shield"></i>
        </div>
        
        <h2>Create Account</h2>
        <div class="note">Join us and take control of your digital security</div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="error-alert">
                <i class="fas fa-circle-info"></i> {{ messages[0] }}
            </div>
        {% endif %}
        {% endwith %}

        <form method="POST" action="/register">
            <div class="input-group">
                <label>Full Name</label>
                <div class="input-wrapper">
                    <input type="text" name="name" placeholder="Analyst Name" required>
                    <i class="fas fa-user"></i>
                </div>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <input type="email" name="email" placeholder="Email@gmail.com" required>
                    <i class="fas fa-envelope"></i>
                </div>
            </div>
            
            <div class="input-group">
                <label>Access Password</label>
                <div class="input-wrapper">
                    <input type="password" name="password" placeholder="••••••••" required>
                    <i class="fas fa-lock"></i>
                </div>
            </div>

            <button type="submit">Complete Registration</button>
        </form>

        <p class="login-link">Already a member? <a href="/login">Login here</a></p>
    </div>

</body>
</html>
