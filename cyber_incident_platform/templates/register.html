<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cyber Incident Monitor - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #6a11cb, #9c27b0);
        }

        .register-box{
            background:white;
            padding:40px 30px;
            width:360px;
            border-radius:15px;
            box-shadow:0 15px 35px rgba(0,0,0,0.2);
            text-align:center;
            animation: fadeIn 1s ease;
        }

        .register-box h2{
            margin-bottom:25px;
            color:#6a11cb;
        }

        .input-box{
            margin-bottom:18px;
            text-align:left;
        }

        .input-box label{
            font-size:14px;
            font-weight:500;
        }

        .input-box input{
            width:100%;
            padding:12px;
            margin-top:5px;
            border-radius:8px;
            border:1px solid #ccc;
            outline:none;
            transition:0.3s;
        }

        .input-box input:focus{
            border-color:#9c27b0;
            box-shadow:0 0 5px rgba(156,39,176,0.3);
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:25px;
            background:linear-gradient(135deg, #6a11cb, #9c27b0);
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:scale(1.05);
        }

        p{
            margin-top:15px;
            font-size:14px;
        }

        a{
            color:#6a11cb;
            text-decoration:none;
            font-weight:500;
        }

        .error{
            background:#f8d7da;
            color:#721c24;
            padding:10px;
            margin-bottom:10px;
            border-radius:5px;
        }

        @keyframes fadeIn{
            0%{opacity:0; transform: translateY(-20px);}
            100%{opacity:1; transform: translateY(0);}
        }

        .note{
            font-size:13px;
            color:#555;
            margin-bottom:15px;
        }
    </style>
</head>
<body>

<div class="register-box">
    <h2>CREATE ACCOUNT</h2>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
        <div class="error">{{ messages[0] }}</div>
    {% endif %}
    {% endwith %}

    <div class="note">
       Join us and take control of your digital security
    </div>

    <form method="POST" action="/register">
        <div class="input-box">
            <label>Full Name</label>
            <input type="text" name="name" required>
        </div>

        <div class="input-box">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>

        <div class="input-box">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <button type="submit">Register</button>
    </form>

    <p>Already have an account? <a href="/login">Login</a></p>
</div>

</body>
</html>
