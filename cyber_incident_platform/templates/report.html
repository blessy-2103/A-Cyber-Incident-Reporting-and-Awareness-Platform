<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Cyber Incident | Secure Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --deep-purple: #2e1065;
            --mid-purple: #6b21a8;
            --bright-purple: #a855f7;
            --white: #ffffff;
            --text-dark: #1e1b4b;
            --text-muted: #64748b;
            --neon-green: #00ff88;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--deep-purple);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* --- BACKGROUND --- */
        .bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #2e1065 0%, #4c1d95 50%, #6b21a8 100%);
            z-index: -2;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.5;
            animation: drift 15s infinite alternate ease-in-out;
        }
        .orb-1 { width: 600px; height: 600px; background: #9333ea; top: -10%; left: -10%; }
        .orb-2 { width: 400px; height: 400px; background: #c084fc; bottom: -10%; right: -10%; animation-delay: -5s; }

        @keyframes drift {
            from { transform: translate(0, 0); }
            to { transform: translate(50px, 50px); }
        }

        header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 15px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky; top: 0; z-index: 100;
        }

        header h1 {
            color: white; font-size: 20px; font-weight: 800;
            display: flex; align-items: center; gap: 10px;
        }

        .home-btn {
            background: var(--white); color: var(--mid-purple); border: none;
            padding: 10px 24px; border-radius: 12px; font-weight: 700;
            cursor: pointer; transition: 0.3s; text-decoration: none; font-size: 14px;
        }
        .home-btn:hover { background: var(--bright-purple); color: white; transform: translateY(-2px); }

        /* --- FORM --- */
        .container { display: flex; justify-content: center; padding: 60px 20px; }

        .form-card {
            background: rgba(255, 255, 255, 0.98);
            width: 100%; max-width: 650px;
            padding: 45px;
            border-radius: 30px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group { margin-bottom: 22px; }
        .input-group label {
            display: block; font-weight: 700; font-size: 13px;
            color: var(--text-dark); text-transform: uppercase;
            margin-bottom: 8px; margin-left: 5px;
        }

        .input-group input, .input-group select, .input-group textarea {
            width: 100%; padding: 14px 16px; border-radius: 14px;
            border: 2px solid #f1f5f9; background: #f8fafc;
            font-size: 15px; font-weight: 500; outline: none; transition: 0.3s;
        }

        .input-group input:focus, .input-group select:focus, .input-group textarea:focus {
            border-color: var(--mid-purple); background: white;
            box-shadow: 0 0 0 4px rgba(107, 33, 168, 0.1);
        }

        /* --- NEW: TOGGLE SWITCH --- */
        .switch-container {
            background: #f5f3ff; padding: 15px 20px; border-radius: 16px;
            display: flex; justify-content: space-between; align-items: center;
            border: 2px solid #ddd6fe; margin-bottom: 25px;
        }

        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #cbd5e1; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--mid-purple); }
        input:checked + .slider:before { transform: translateX(22px); }

        /* --- NEW: UPLOAD AREA --- */
        .upload-area {
            border: 2px dashed #cbd5e1; padding: 25px; border-radius: 16px;
            text-align: center; cursor: pointer; transition: 0.3s; background: #f8fafc;
        }
        .upload-area:hover { border-color: var(--mid-purple); background: #f5f3ff; }

        .submit-btn {
            width: 100%; padding: 16px; border: none; border-radius: 16px;
            background: linear-gradient(135deg, var(--mid-purple), var(--bright-purple));
            color: white; font-size: 16px; font-weight: 700;
            cursor: pointer; transition: 0.4s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .submit-btn:hover { transform: translateY(-3px); filter: brightness(1.1); }

    </style>
</head>

<body>

<div class="bg-canvas"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<header>
    <h1><i class="fas fa-shield-virus"></i> CYBER INCIDENT PORTAL</h1>
    <a href="/" class="home-btn">BACK TO HOME</a>
</header>

<div class="container">
    <div class="form-card">
        <h2 style="text-align: center; color: var(--text-dark); font-weight: 800; font-size: 28px; letter-spacing: -1px;">Report Incident</h2>
        <p style="text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 30px;">Your submission is secured with end-to-end encryption.</p>

        <form method="POST" action="/report" enctype="multipart/form-data">

            <div class="switch-container">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <i class="fas fa-user-secret" style="color: var(--mid-purple); font-size: 18px;"></i>
                    <span style="font-weight: 700; font-size: 13px; color: var(--text-dark); text-transform: uppercase;">Incognito Mode (Anonymous)</span>
                </div>
                <label class="switch">
                    <input type="checkbox" name="anonymous" id="anonToggle" onchange="toggleReporterField()">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="input-group">
                <label><i class="fas fa-list-ul"></i> Incident Category</label>
                <select name="incident_type" required>
                    <option value="" disabled selected>Select category...</option>
                    <option>Phishing Attack</option>
                    <option>Malware / Virus</option>
                    <option>Ransomware</option>
                    <option>Data Leak</option>
                    <option>Unauthorized Access</option>
                    <option>Social Engineering</option>
                </select>
            </div>

            <div class="input-group">
                <label><i class="fas fa-heading"></i> Incident Title</label>
                <input type="text" name="title" placeholder="Briefly describe the threat" required>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="input-group">
                    <label><i class="fas fa-calendar-day"></i> Discovery Date</label>
                    <input type="date" name="incident_date" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-bolt"></i> Severity</label>
                    <select name="severity" required>
                        <option>Low</option>
                        <option>Medium</option>
                        <option>High</option>
                        <option>Critical</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label><i class="fas fa-laptop-code"></i> Affected Asset</label>
                <input type="text" name="affected_system" placeholder="e.g. Work Laptop, Database, API Endpoint">
            </div>

            <div class="input-group" id="reporterFieldGroup">
                <label><i class="fas fa-user-edit"></i> Reporter Name</label>
                <input type="text" name="reporter" id="reporterInput" placeholder="Enter your full name">
            </div>

            <div class="input-group">
                <label><i class="fas fa-align-left"></i> Threat Description</label>
                <textarea name="description" placeholder="Provide as much detail as possible..." required></textarea>
            </div>

            <div class="input-group">
                <label><i class="fas fa-paperclip"></i> Evidence (Logs / Screenshots)</label>
                <div class="upload-area" onclick="document.getElementById('evidenceInput').click()">
                    <input type="file" name="evidence" id="evidenceInput" style="display: none;" onchange="updateFileName()">
                    <i class="fas fa-cloud-upload-alt" style="font-size: 28px; color: var(--mid-purple); margin-bottom: 10px;"></i>
                    <p id="fileLabel" style="font-size: 13px; color: var(--text-muted); font-weight: 600;">Click to browse files</p>
                </div>
            </div>

            <button type="submit" class="submit-btn">
                <i class="fas fa-paper-plane"></i> TRANSMIT REPORT
            </button>

        </form>
    </div>
</div>

<script>
    function toggleReporterField() {
        const isAnon = document.getElementById('anonToggle').checked;
        const reporterField = document.getElementById('reporterFieldGroup');
        const reporterInput = document.getElementById('reporterInput');
        
        if (isAnon) {
            reporterField.style.display = 'none';
            reporterInput.value = "Anonymous"; // Sets value for DB processing
        } else {
            reporterField.style.display = 'block';
            reporterInput.value = ""; 
        }
    }

    function updateFileName() {
        const input = document.getElementById('evidenceInput');
        const label = document.getElementById('fileLabel');
        if (input.files.length > 0) {
            label.innerText = "File Selected: " + input.files[0].name;
            label.style.color = "var(--mid-purple)";
        }
    }
</script>

</body>
</html>
